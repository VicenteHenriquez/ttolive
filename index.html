<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f3e7d3" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>TILT! — esquiva o muere</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" hidden>
  <div class="hud-left">
    <div id="score">0</div>
    <div id="multiplier" class="mult-hidden">×1</div>
  </div>
  <div class="hud-right">
    <div id="best-inline"></div>
    <button id="mute" aria-label="Silenciar sonido">♪</button>
  </div>
</div>

<div id="overlay">
  <section id="screen-start" class="panel">
    <h1><span class="t1">TILT</span><span class="t2">!</span></h1>
    <p class="tagline">Eres la flecha. Los puntos rojos te odian.<br/>Esquívalos y recoge las armas.</p>

    <div class="select-row" id="mode-row">
      <button class="chip" data-mode="classic">CLÁSICO</button>
      <button class="chip" data-mode="chaos">CAOS</button>
      <button class="chip" data-mode="zen">PACIFISTA</button>
    </div>
    <p id="mode-desc" class="mode-desc"></p>

    <div class="weapons-legend">
      <span><i class="orb orb-nuke"></i> Nuke</span>
      <span><i class="orb orb-frost"></i> Hielo</span>
      <span><i class="orb orb-wave"></i> Onda</span>
      <span><i class="orb orb-bolt"></i> Rayo</span>
      <span><i class="orb orb-sword"></i> Espada</span>
    </div>

    <button id="btn-start" class="big-btn">JUGAR</button>
    <button id="btn-tilt" class="big-btn alt" hidden>JUGAR CON INCLINACIÓN</button>
    <p id="controls-hint" class="hint"></p>
    <p id="best" class="best"></p>
  </section>

  <section id="screen-over" class="panel" hidden>
    <h2 id="over-title">TE ATRAPARON</h2>
    <p class="final-score"><span id="final-score">0</span> pts</p>
    <p id="over-detail" class="hint"></p>
    <p id="over-unlock" class="unlock-msg" hidden></p>
    <button id="btn-retry" class="big-btn">OTRA VEZ</button>
    <button id="btn-home" class="text-btn">← Pantalla de inicio</button>
  </section>

  <section id="screen-config" class="panel" hidden>
    <h2 class="config-title">AJUSTES</h2>

    <span class="row-label">TEMA</span>
    <div class="select-row" id="theme-row" aria-label="Tema de colores"></div>

    <span class="row-label">CURSOR</span>
    <div class="select-row" id="cursor-row" aria-label="Cursor del jugador"></div>
    <p id="cursor-desc" class="mode-desc"></p>

    <span class="row-label">COLOR CURSOR</span>
    <div class="select-row color-row" id="cursor-color-row" aria-label="Color del cursor"></div>

    <span class="row-label">COLOR ESTELA</span>
    <div class="select-row color-row" id="trail-color-row" aria-label="Color de la estela"></div>

    <div class="select-row" id="sens-row" hidden>
      <span class="row-label">SENSIBILIDAD</span>
      <button class="chip" data-sens="suave">SUAVE</button>
      <button class="chip" data-sens="normal">NORMAL</button>
      <button class="chip" data-sens="rapida">RÁPIDA</button>
    </div>

    <div class="select-row feel-row" id="feel-row" hidden>
      <span class="row-label">CONTROL</span>
      <span class="feel-end">Deslizante</span>
      <input type="range" id="feel-range" min="0" max="100" step="1" aria-label="Control" />
      <span class="feel-end">Preciso</span>
    </div>

    <button id="btn-config-done" class="big-btn">LISTO</button>
  </section>
</div>

<button id="btn-config" aria-label="Ajustes" hidden>⚙</button>

<div id="rotate">
  <div class="phone">📱</div>
  <p>GIRA EL TELÉFONO</p>
  <span>Este juego se juega en horizontal</span>
</div>

<script src="game.js"></script>
</body>
</html>
