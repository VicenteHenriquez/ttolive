name: Deploy a Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_a86kKAwTfX25kSxRnNQnDqBN
      VERCEL_PROJECT_ID: prj_TOK3IJWeFO5TI6PlErC6ZastH0Ci
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing Vercel token. Configure VERCEL_TOKEN or VERCEL_ACCESS_TOKEN secret."
            exit 1
          fi
          npx -y vercel deploy --prod --yes --token="$VERCEL_TOKEN"
